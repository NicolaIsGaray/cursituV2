<nav class="top-nav">
  <button class="btn-back" routerLink="/home">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar al menú
  </button>
</nav>
<div class="course-header">
  <h2>{{subject?.subject_name}}</h2>
</div>

<div class="classroom-container">
  <!-- Sidebar: Siempre visible si hay lista de temas -->
  <aside class="sections-sidebar" [style.background-color]="subject?.color">
    <div class="sidebar-header">
      <h3>Secciones</h3>
      <div class="divider"></div>
    </div>

    <ul class="sections-list" *ngIf="topicsList$ | async as topics">
      <li *ngFor="let topic of topics" 
          class="section-item"
          [class.active]="(selectedTopic$ | async)?.id === topic.id"
          (click)="seleccionarTema(topic)">
        <div class="indicator"></div>
        <p>{{topic.title}}</p>
      </li>
    </ul>
  </aside>

  <!-- Área de Contenido: Solo muestra el card si hay un tema seleccionado -->
  <div class="content-area">
    <div class="admin-top-actions" *ngIf="(authService.userRole$ | async) === 'DOCENTE'">
      <button class="btn-manage edit">
        <span class="material-symbols-outlined">edit</span>
        Editar
      </button>
      <button class="btn-manage delete">
        <span class="material-symbols-outlined">delete</span>
        Eliminar
      </button>
    </div>

    <div class="content-card" *ngIf="selectedTopic$ | async as activeTopic; else loadingOrEmpty">
      <div class="text-content">
        <h3>{{activeTopic.title}}</h3>
        <p>{{activeTopic.content}}</p>
      </div>
    </div>

    <!-- Template opcional para cuando no hay selección todavía -->
    <ng-template #loadingOrEmpty>
      <div class="loading-state">
        <p>Cargando...</p>
      </div>
    </ng-template>
  </div>
</div>

<!-- Botón Flotante "+" (FAB) mejorado -->
<button class="fab-add" *ngIf="(authService.userRole$ | async) === 'DOCENTE'" routerLink="/add-class">
  <span class="material-symbols-outlined">add</span>
</button>
