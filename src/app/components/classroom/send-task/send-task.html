<nav class="top-nav">
  <button class="btn-back" routerLink="/home">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar al menú
  </button>
</nav>
<div [ngStyle]="materiaColorStyle">
  <!-- Encabezado con el nombre de la materia -->
  <div class="course-header">
    <h2>Programación Orientada a Objetos</h2>
  </div>

  <div class="assignment-wrapper">
    <!-- Área de Entrega (Contenido Principal) -->
    <main class="delivery-area">
      <div class="delivery-card">
        <header class="assignment-header">
          <h3 class="assignment-title">Entrega: Manejo de Excepciones</h3>
          <div class="deadline-badge">
            <span class="material-symbols-outlined">timer</span>
            <p>Vence: <span>Martes 02 de Abril, 00:00 HS</span></p>
          </div>
        </header>

        <!-- Selector de Formato -->
        <div class="delivery-section">
          <label>Formato de entrega</label>
          <div class="format-buttons">
            <button class="format-btn active">Archivo</button>
            <button class="format-btn">Carpeta</button>
            <button class="format-btn">Texto</button>
          </div>
        </div>

        <!-- Área de Carga -->
        <div class="delivery-section">
          <label>Archivo o Carpeta</label>
          <div class="upload-box">
            <button class="upload-area-btn">
              <span class="material-symbols-outlined">cloud_upload</span>
              <span>Seleccionar archivo</span>
            </button>
            <p class="nota-text">
              <span class="material-symbols-outlined">info</span>
              <span><b>Importante:</b> Revisa que el archivo sea el correcto antes de confirmar.</span>
            </p>
          </div>
        </div>

        <!-- Comentarios -->
        <div class="delivery-section">
          <label>Comentario (Opcional)</label>
          <div class="comment-container">
            <textarea placeholder="¿Alguna observación para el docente?..." rows="4"></textarea>
          </div>
        </div>

        <!-- Botón de Acción -->
        <div class="submit-container">
          <button class="submit-btn">Realizar Entrega</button>
        </div>
      </div>
    </main>
  </div>
</div>
