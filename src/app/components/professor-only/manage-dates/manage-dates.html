<main *ngIf="authService.userRole$ | async as rol">
  <div class="gestion-fechas-container" *ngIf="rol === 'DOCENTE'">
    <!-- Sidebar de Materias -->
    <aside class="materias-selector">
      <h3>Materias</h3>
      <div class="materias-list">
        <button class="materia-btn active" [style.background-color]="'#ff912c'">
          PROGRAMACIÓN ORIENTADA A OBJETOS
        </button>
        <button class="materia-btn" [style.background-color]="'#2ecc71'">
          BASE DE DATOS AVANZADA
        </button>
      </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="calendario-content">
      <header class="calendario-header">
        <h2>Gestión de Fechas Importantes</h2>
        <button class="btn-programar">
          <span class="material-symbols-outlined">calendar_add_on</span>
          Programar Fecha
        </button>
      </header>

      <div class="calendario-card">
        <div class="calendario-banner" [style.background-color]="'#ff912c'">
          CALENDARIO ACADÉMICO - P.O.O.
        </div>

        <div class="fechas-lista">
          <!-- Item: Examen -->
          <div class="fecha-item">
            <div class="icon-box examen">
              <span class="material-symbols-outlined">priority_high</span>
            </div>
            <div class="fecha-info">
              <h4>Parcial N° 1</h4>
              <span>EXAMEN</span>
            </div>
            <div class="fecha-controls">
              <input type="text" class="date-display" value="04 / 05 / 2026" readonly />
              <button class="btn-action">
                <span class="material-symbols-outlined">notifications</span>
              </button>
              <button class="btn-action">
                <span class="material-symbols-outlined">save</span>
              </button>
              <button class="btn-action delete">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </div>

          <!-- Item: Entrega -->
          <div class="fecha-item">
            <div class="icon-box entrega">
              <span class="material-symbols-outlined">assignment_turned_in</span>
            </div>
            <div class="fecha-info">
              <h4>Entrega TP Final</h4>
              <span>ENTREGA</span>
            </div>
            <div class="fecha-controls">
              <input type="text" class="date-display" value="15 / 06 / 2026" readonly />
              <button class="btn-action">
                <span class="material-symbols-outlined">notifications</span>
              </button>
              <button class="btn-action">
                <span class="material-symbols-outlined">save</span>
              </button>
              <button class="btn-action delete">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </div>

          <!-- Item: Clase -->
          <div class="fecha-item">
            <div class="icon-box clase">
              <span class="material-symbols-outlined">menu_book</span>
            </div>
            <div class="fecha-info">
              <h4>Clase de Repaso</h4>
              <span>CLASE</span>
            </div>
            <div class="fecha-controls">
              <input type="text" class="date-display" value="30 / 04 / 2026" readonly />
              <button class="btn-action">
                <span class="material-symbols-outlined">notifications</span>
              </button>
              <button class="btn-action">
                <span class="material-symbols-outlined">save</span>
              </button>
              <button class="btn-action delete">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</main>
