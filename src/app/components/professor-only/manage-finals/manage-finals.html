<nav class="top-nav">
  <button class="btn-back" routerLink="/professor-panel">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar
  </button>
</nav>
<main *ngIf="authService.userRole$ | async as rol">
    <div class="gestion-parciales-container" *ngIf="rol === 'DOCENTE'">    
      <!-- Panel de Parciales -->
      <main class="parciales-panel">
        <h2>Gestión de Parciales</h2>
    
        <div class="examen-card">
          <header class="examen-header">
            <div class="examen-title-group">
              <h3>PRIMER PARCIAL</h3>
              <span class="materia-sub">Materia: Programación Orientada a Objetos</span>
            </div>
            <div class="examen-top-actions">
              <button class="btn-tool"><span class="material-symbols-outlined">settings</span></button>
              <button class="btn-tool"><span class="material-symbols-outlined">download</span></button>
            </div>
          </header>
    
          <!-- Grid de Información Logística -->
          <div class="logistics-grid">
            <div class="log-item">
              <span class="log-label">FECHA</span>
              <div class="log-value-box">
                04 / 05 / 2026 <span class="material-symbols-outlined">calendar_today</span>
              </div>
            </div>
            <div class="log-item">
              <span class="log-label">HORA INICIO</span>
              <div class="log-value-box">08 : 30 a. m.</div>
            </div>
            <div class="log-item">
              <span class="log-label">AULA</span>
              <div class="log-value-box">Aula 5</div>
            </div>
            <div class="log-item">
              <span class="log-label">INSCRIPTOS</span>
              <div class="log-value-box">32 Alumnos</div>
            </div>
          </div>
    
          <!-- Tabla de Alumnos -->
          <div class="alumnos-table">
            <div class="table-head">
              <span class="col-name">Alumno</span>
              <span class="col-attendance">Asistencia</span>
              <span class="col-grade">Nota</span>
            </div>
    
            <div class="table-body">
              <!-- Alumno 1 -->
              <div class="student-row">
                <span class="col-name"><strong>Garay, Facundo</strong></span>
                <span class="col-attendance"><span class="status-badge presente">Presente</span></span>
                <span class="col-grade"><p class="mini-grade">8</p></span>
              </div>
    
              <!-- Alumno 2 -->
              <div class="student-row">
                <span class="col-name"><strong>Diaz, Martin</strong></span>
                <span class="col-attendance"><span class="status-badge presente">Presente</span></span>
                <span class="col-grade"><p class="mini-grade">5</p></span>
              </div>
    
              <!-- Alumno 3 -->
              <div class="student-row">
                <span class="col-name"><strong>Perez, Juan</strong></span>
                <span class="col-attendance"><span class="status-badge ausente">Ausente</span></span>
                <span class="col-grade"><p class="mini-grade">-</p></span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
</main>
