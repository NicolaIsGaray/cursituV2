<main *ngIf="authService.userRole$ | async as rol">
  <div class="notas-container" *ngIf="rol === 'DOCENTE'">
    <!-- Columna Principal: Planilla -->
    <main class="planilla-content">
      <nav class="top-nav">
        <button class="btn-back" routerLink="/professor-panel">
          <span class="material-symbols-outlined">arrow_back</span>
          Regresar al Panel
        </button>
      </nav>
      <div class="planilla-header">
        <h2>Planilla de Calificaciones</h2>
        <button class="btn-nueva-nota">
          <span class="material-symbols-outlined">add_circle</span>
          Nueva Nota
        </button>
      </div>

      <div class="planilla-wrapper">
        <div class="table-header-banner">PROGRAMACIÓN ORIENTADA A OBJETOS - LISTADO</div>

        <table class="notas-table">
          <thead>
            <tr>
              <th>Alumno</th>
              <th>Actividad</th>
              <th>Nota</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Fila de ejemplo 1 -->
            <tr>
              <td class="alumno-name">Facundo Garay</td>
              <td>Parcial 1</td>
              <td><input type="number" class="input-nota" value="8" /></td>
              <td class="actions-cell">
                <button class="btn-save">
                  <span class="material-symbols-outlined">save</span>
                </button>
                <button class="btn-delete">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </td>
            </tr>
            <!-- Fila de ejemplo 2 (Desaprobado) -->
            <tr>
              <td class="alumno-name">Maria Gomez</td>
              <td>Parcial 1</td>
              <td><input type="number" class="input-nota fail" value="5" /></td>
              <td class="actions-cell">
                <button class="btn-save">
                  <span class="material-symbols-outlined">save</span>
                </button>
                <button class="btn-delete">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</main>
