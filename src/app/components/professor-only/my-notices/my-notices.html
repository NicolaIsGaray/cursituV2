<nav class="top-nav">
  <button class="btn-back" routerLink="/home">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar al menú
  </button>
</nav>
<main *ngIf="authService.userRole$ | async as rol">
  <div class="avisos-container" *ngIf="rol === 'DOCENTE'">
    <div class="main-stack">
      
      <!-- SECCIÓN SUPERIOR: Crear Nuevo Aviso -->
      <section class="crear-aviso-card">
        <div class="card-header-accent">
          <h2>Crear Nuevo Aviso</h2>
        </div>
        
        <div class="card-body">
          <div class="form-group">
            <label>Asunto</label>
            <input type="text" class="input-field" placeholder="Escriba el título del aviso...">
          </div>
    
          <div class="form-group">
            <label>Mensaje</label>
            <textarea class="textarea-field" placeholder="Escriba el contenido del mensaje..."></textarea>
          </div>
    
          <button class="btn-enviar-aviso">
            <span class="material-symbols-outlined">send</span>
            Enviar Aviso
          </button>
        </div>
      </section>
  
      <!-- SECCIÓN INFERIOR: Avisos Publicados -->
      <section class="publicados-container">
        <div class="list-header">
          <h3>Avisos Publicados</h3>
        </div>

        <div class="avisos-grid">
          <!-- Card de Aviso -->
          <article class="aviso-item" *ngFor="let i of [1,2,3,4,5]">
            <div class="aviso-main">
              <div class="aviso-content">
                <span class="aviso-titulo">"Suspensión de clases"</span>
                <span class="aviso-fecha">Publicado: Lunes 04 de Abril de 2026</span>
              </div>
              <div class="aviso-actions">
                <button class="action-btn edit" title="Editar">
                  <span class="material-symbols-outlined">edit</span>
                </button>
                <button class="action-btn delete" title="Eliminar">
                  <span class="material-symbols-outlined">delete</span>
                </button>
              </div>
            </div>
          </article>
        </div>
      </section>
  
    </div>
  </div>
</main>
