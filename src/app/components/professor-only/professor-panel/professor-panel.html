<nav class="top-nav">
  <button class="btn-back" routerLink="/home">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar al menú
  </button>
</nav>
<main *ngIf="authService.userRole$ | async as rol">
  <div class="curso-container" *ngIf="rol === 'DOCENTE'">
    <!-- Título de la materia con breadcrumb implícito -->
    <header class="curso-header">
      <span class="subject-tag">Materia</span>
      <h2>Programación Orientada a Objetos</h2>
    </header>

    <div class="curso-wrapper">
      <div class="welcome-banner">
        <h3 class="greeting-title">¿Qué haremos hoy, profe?</h3>
        <p class="greeting-subtitle">Seleccione una opción para gestionar su curso.</p>
      </div>

      <div class="actions-grid">
        <!-- Ver Notas -->
        <a class="action-card color-1" routerLink="/manage-grades">
          <div class="icon-box">
            <span class="material-symbols-outlined">fact_check</span>
          </div>
          <span class="card-label">Gestionar Notas</span>
        </a>

        <!-- Gestionar Clases -->
        <a class="action-card color-1" routerLink="/current-classroom">
          <div class="icon-box">
            <span class="material-symbols-outlined">school</span>
          </div>
          <span class="card-label">Gestionar Clases</span>
        </a>

        <!-- Editar Materia -->
        <a class="action-card color-1" routerLink="/edit-subject">
          <div class="icon-box">
            <span class="material-symbols-outlined">edit_note</span>
          </div>
          <span class="card-label">Editar Materia</span>
        </a>

        <!-- Gestionar Fechas -->
        <a class="action-card color-1" routerLink="/manage-dates">
          <div class="icon-box">
            <span class="material-symbols-outlined">edit_calendar</span>
          </div>
          <span class="card-label">Gestionar Fechas</span>
        </a>

        <!-- Gestionar Trabajos Prácticos -->
        <a class="action-card color-1" routerLink="/manage-tasks">
          <div class="icon-box">
            <span class="material-symbols-outlined">assignment</span>
          </div>
          <span class="card-label">Gestionar TPs</span>
        </a>

        <!-- Gestionar Parciales -->
        <a class="action-card color-1" routerLink="/manage-finals">
          <div class="icon-box">
            <span class="material-symbols-outlined">view_kanban</span>
          </div>
          <span class="card-label">Gestionar Parciales</span>
        </a>
      </div>
    </div>
  </div>
</main>
