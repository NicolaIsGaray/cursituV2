<nav class="top-nav">
  <button class="btn-back" routerLink="/home">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar al menú
  </button>
</nav>
<main *ngIf="authService.userRole$ | async as rol">
  <div class="alumnos-lista-container" *ngIf="rol === 'DOCENTE'">
    <header class="seccion-header">
      <div class="title-group">
        <h2>Lista Alumnos</h2>
        <!-- El botón ahora está junto al título para acceso rápido -->
        <button class="btn-export-accent">
          <span class="material-symbols-outlined">ios_share</span>
          <span>Exportar Lista</span>
        </button>
      </div>

      <div class="header-tools">
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input type="text" placeholder="Buscar por nombre o curso...">
        </div>
      </div>
    </header>
  
    <div class="tabla-container">
      <table class="cursitu-table">
        <thead>
          <tr>
            <th>Nombre Completo</th>
            <th>Curso</th>
            <th>Comisión</th>
            <th>Tiene Grupo</th>
            <th class="text-center">Número de Grupo</th>
            <!-- Columna de acciones eliminada -->
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="col-nombre">
              <div class="alumno-perfil">
                <div class="avatar-sm">F</div>
                <span>FACUNDO NICOLAS GARAY GONZALEZ</span>
              </div>
            </td>
            <td>36</td>
            <td>A</td>
            <td>
              <span class="badge badge-no">NO</span>
            </td>
            <td class="text-center">
              <span class="group-number">-</span>
            </td>
          </tr>
          
          <tr>
            <td class="col-nombre">
              <div class="alumno-perfil">
                <div class="avatar-sm">M</div>
                <span>MARTIN DIAZ</span>
              </div>
            </td>
            <td>36</td>
            <td>A</td>
            <td>
              <span class="badge badge-si">SI</span>
            </td>
            <td class="text-center">
              <span class="group-number">2</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
